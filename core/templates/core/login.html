<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5" style="max-width: 420px;">
  <h1 class="h4 mb-3">Вход в систему</h1>
  {% if form.errors %}
    <div class="alert alert-danger">Неверные имя пользователя или пароль.</div>
  {% endif %}
  <form method="post" action="{% url 'login' %}">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label" for="id_username">Имя пользователя</label>
      <input type="text" name="username" autofocus required class="form-control" id="id_username">
    </div>
    <div class="mb-3">
      <label class="form-label" for="id_password">Пароль</label>
      <input type="password" name="password" required class="form-control" id="id_password">
    </div>
    <input type="hidden" name="next" value="{{ next }}">
    <button type="submit" class="btn btn-primary w-100">Войти</button>
  </form>
</div>
</body>
</html>
